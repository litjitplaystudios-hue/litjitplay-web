<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Number Party</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #unity-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
      }

      #unity-canvas {
        height: 100vh;
        width: auto;
        aspect-ratio: 9 / 16;
        max-width: 100vw;
        max-height: 100vh;
        background: #000;
        outline: none;
      }

      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(64vw, 360px);
        height: 8px;
        background: rgba(255, 255, 255, 0.18);
      }

      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        background: #34c879;
      }

      #unity-error-message {
        display: none;
        position: absolute;
        left: 50%;
        top: calc(50% + 40px);
        transform: translateX(-50%);
        width: min(80vw, 520px);
        color: #fff;
        font: 16px/1.5 sans-serif;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-full"></div>
      </div>
      <div id="unity-error-message" role="alert"></div>
    </div>
    <script src="Build/NumberParty.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");
      const loadingBar = document.querySelector("#unity-loading-bar");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const errorMessage = document.querySelector("#unity-error-message");

      createUnityInstance(canvas, {
        dataUrl: "Build/NumberParty.data.gz",
        frameworkUrl: "Build/NumberParty.framework.js.gz",
        codeUrl: "Build/NumberParty.wasm.gz",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Number Party",
        productVersion: "1.0"
      }, (progress) => {
        progressBarFull.style.width = `${100 * progress}%`;
      }).then(() => {
        loadingBar.style.display = "none";
      }).catch((error) => {
        loadingBar.style.display = "none";
        errorMessage.textContent = "Unable to load Number Party. Please refresh the page and try again.";
        errorMessage.style.display = "block";
        console.error(error);
      });
    </script>
  </body>
</html>
